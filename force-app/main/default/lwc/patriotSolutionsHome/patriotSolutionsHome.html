<template>
  <div class="dashboard-shell">
    <aside class="sidebar">
      <div class="sidebar-heading">
        <h2>Recruitment</h2>
        <p>Management</p>
      </div>

      <nav class="side-nav" aria-label="Recruitment management">
        <template for:each={navItems} for:item="item">
          <button
            key={item.label}
            class={item.className}
            type="button"
            data-view={item.viewId}
            onclick={handleNavClick}
          >
            <lightning-icon
              class="dashboard-icon"
              icon-name={item.iconName}
              size="x-small"
              alternative-text={item.label}
            ></lightning-icon>
            <span>{item.label}</span>
          </button>
        </template>
      </nav>

      <div class="sidebar-footer">
        <button class="primary-pill" type="button" onclick={handleNewCandidate}>
          <lightning-icon
            class="dashboard-icon inverse-icon"
            icon-name="utility:add"
            size="x-small"
            alternative-text="Add"
          ></lightning-icon>
          Add Candidate
        </button>
      </div>
    </aside>

    <div class="content-region">
      <main class="main-content">
        <div class="content-container">
          <section class="page-heading">
            <div>
              <h1>{pageTitle}</h1>
              <p>{pageDescription}</p>
            </div>
            <div class="heading-actions">
              <button
                class="secondary-pill"
                type="button"
                onclick={handleViewAnalytics}
              >
                View Analytics
              </button>
              <button
                class="primary-pill"
                type="button"
                onclick={handleDownloadReport}
              >
                Open Reports
              </button>
            </div>
          </section>

          <template lwc:if={hasLoadError}>
            <div
              class="slds-notify slds-notify_alert slds-alert_error slds-m-bottom_medium"
              role="alert"
            >
              Unable to load live dashboard data. Deploy the Apex controller to
              your org to enable dynamic metrics.
            </div>
          </template>

          <template lwc:if={isLoading}>
            <div class="loading-wrap slds-is-relative slds-m-vertical_large">
              <lightning-spinner
                alternative-text="Loading dashboard"
                size="medium"
              ></lightning-spinner>
            </div>
          </template>

          <template lwc:else>
            <template lwc:if={isDashboardView}>
              <section class="kpi-grid" aria-label="Hiring metrics">
                <template for:each={kpis} for:item="kpi">
                  <article class="slds-card kpi-card" key={kpi.key}>
                    <div class="metric-icon">
                      <lightning-icon
                        class="dashboard-icon"
                        icon-name={kpi.iconName}
                        size="small"
                        alternative-text={kpi.label}
                      ></lightning-icon>
                    </div>
                    <div class="metric-body">
                      <p>{kpi.label}</p>
                      <div class="metric-value-row">
                        <strong>{kpi.value}</strong>
                      </div>
                    </div>
                  </article>
                </template>
              </section>

              <div class="dashboard-grid">
                <div class="primary-column">
                  <section class="slds-card panel">
                    <div class="panel-header">
                      <h2>Candidate Pipeline</h2>
                      <button
                        class="text-link"
                        type="button"
                        onclick={handleViewBoard}
                      >
                        View Board
                        <lightning-icon
                          class="dashboard-icon link-icon"
                          icon-name="utility:forward"
                          size="xx-small"
                          alternative-text="View board"
                        ></lightning-icon>
                      </button>
                    </div>

                    <template lwc:if={pipelineError}>
                      <p class="empty-state">Unable to load pipeline data.</p>
                    </template>
                    <template lwc:elseif={hasPipeline}>
                      <div class="kanban-scroll">
                        <div class={dashboardKanbanClass}>
                          <template
                            for:each={dashboardPipelineStages}
                            for:item="stage"
                          >
                            <section class={stage.stageClass} key={stage.key}>
                              <div class="kanban-title">
                                <span>{stage.label}</span>
                              </div>
                              <div class="kanban-column-cards">
                                <template
                                  for:each={stage.candidates}
                                  for:item="candidate"
                                >
                                  <button
                                    class={candidate.cardClass}
                                    key={candidate.key}
                                    type="button"
                                    data-id={candidate.recordId}
                                    onclick={handleCandidateClick}
                                  >
                                    <div class="candidate-top">
                                      <strong>{candidate.name}</strong>
                                      <span class="candidate-view-hint"
                                        >View</span
                                      >
                                      <template lwc:if={candidate.showStatus}>
                                        <span class={candidate.badgeClass}>
                                          {candidate.status}
                                        </span>
                                      </template>
                                    </div>
                                    <p>{candidate.role}</p>
                                  </button>
                                </template>
                              </div>
                              <template lwc:if={stage.hasMoreCandidates}>
                                <button
                                  class="text-link stage-more-link"
                                  type="button"
                                  onclick={handleViewBoard}
                                >
                                  {stage.moreLabel}
                                </button>
                              </template>
                            </section>
                          </template>
                        </div>
                      </div>
                    </template>
                    <template lwc:else>
                      <p class="empty-state">
                        No active candidates yet. Add a lead to start building
                        your pipeline.
                      </p>
                    </template>
                  </section>

                  <section class="slds-card panel table-panel">
                    <div class="panel-header">
                      <h2>Upcoming Interviews</h2>
                      <button
                        class="icon-button"
                        type="button"
                        aria-label="Open interviews"
                        data-view="interviews"
                        onclick={handleNavClick}
                      >
                        <lightning-icon
                          class="dashboard-icon"
                          icon-name="utility:event"
                          size="x-small"
                          alternative-text="Open interviews"
                        ></lightning-icon>
                      </button>
                    </div>

                    <template lwc:if={interviewsError}>
                      <p class="empty-state">Unable to load interviews.</p>
                    </template>
                    <template lwc:elseif={hasInterviews}>
                      <div class="table-scroll">
                        <table>
                          <thead>
                            <tr>
                              <th>Candidate</th>
                              <th>Position</th>
                              <th>Date &amp; Time</th>
                              <th>Interviewer</th>
                              <th>Status</th>
                            </tr>
                          </thead>
                          <tbody>
                            <template
                              for:each={interviews}
                              for:item="interview"
                            >
                              <tr
                                key={interview.key}
                                class="clickable-row"
                                data-id={interview.recordId}
                                onclick={handleInterviewClick}
                              >
                                <td class="candidate-name">
                                  {interview.candidate}
                                </td>
                                <td>{interview.position}</td>
                                <td>{interview.date}</td>
                                <td>{interview.interviewer}</td>
                                <td>
                                  <span class={interview.statusClass}>
                                    {interview.status}
                                  </span>
                                </td>
                              </tr>
                            </template>
                          </tbody>
                        </table>
                      </div>
                    </template>
                    <template lwc:else>
                      <p class="empty-state">
                        No upcoming interviews scheduled.
                      </p>
                    </template>
                  </section>
                </div>

                <aside class="secondary-column">
                  <section class="slds-card action-panel">
                    <h2>Quick Actions</h2>
                    <div class="quick-actions">
                      <template for:each={quickActions} for:item="action">
                        <button
                          class="quick-action"
                          data-object={action.objectApiName}
                          key={action.label}
                          type="button"
                          onclick={handleQuickAction}
                        >
                          <lightning-icon
                            class="dashboard-icon"
                            icon-name={action.iconName}
                            size="small"
                            alternative-text={action.label}
                          ></lightning-icon>
                          {action.label}
                        </button>
                      </template>
                    </div>
                  </section>

                  <section class="slds-card onboarding-panel">
                    <h2>Onboarding Progress</h2>
                    <div class="progress-summary">
                      <span>Global Tasks</span>
                      <strong>{progressLabel}</strong>
                    </div>
                    <div class="progress-bar">
                      <div
                        class="progress-fill"
                        style={progressFillStyle}
                      ></div>
                    </div>

                    <template lwc:if={onboardingError}>
                      <p class="empty-state">
                        Unable to load onboarding tasks.
                      </p>
                    </template>
                    <template lwc:else>
                      <ul class="checklist">
                        <template for:each={onboardingTasks} for:item="task">
                          <li class={task.className} key={task.key}>
                            <lightning-icon
                              class="dashboard-icon"
                              icon-name={task.iconName}
                              size="x-small"
                              alternative-text={task.label}
                            ></lightning-icon>
                            <span>{task.label}</span>
                          </li>
                        </template>
                      </ul>
                    </template>
                  </section>

                  <section class="slds-card activity-panel">
                    <div class="panel-header">
                      <h2>Recent Activity</h2>
                    </div>
                    <div class="activity-list">
                      <template lwc:if={activityError}>
                        <p class="empty-state">
                          Unable to load recent activity.
                        </p>
                      </template>
                      <template lwc:elseif={hasActivity}>
                        <template for:each={recentActivity} for:item="activity">
                          <article
                            class={activity.className}
                            key={activity.key}
                          >
                            <span class={activity.dotClass}></span>
                            <div>
                              <p>{activity.message}</p>
                              <small>{activity.time}</small>
                            </div>
                          </article>
                        </template>
                      </template>
                      <template lwc:else>
                        <p class="empty-state">No recent candidate activity.</p>
                      </template>
                      <button
                        class="text-link full-width"
                        type="button"
                        onclick={handleViewAllActivity}
                      >
                        View all activity
                      </button>
                    </div>
                  </section>
                </aside>
              </div>
            </template>

            <template lwc:if={isJobOpeningsView}>
              <section class="view-stack">
                <template lwc:if={jobOpeningsError}>
                  <p class="empty-state">Unable to load job openings.</p>
                </template>
                <template lwc:elseif={hasJobOpenings}>
                  <div class="card-grid">
                    <template for:each={jobOpenings} for:item="opening">
                      <button
                        class={opening.cardClass}
                        key={opening.key}
                        type="button"
                        data-title={opening.title}
                        onclick={handleJobOpeningClick}
                      >
                        <div class="entity-card-header">
                          <lightning-icon
                            class="dashboard-icon"
                            icon-name="standard:job_position"
                            size="small"
                            alternative-text={opening.title}
                          ></lightning-icon>
                          <span class={opening.statusClass}
                            >{opening.status}</span
                          >
                        </div>
                        <h2>{opening.title}</h2>
                        <p>{opening.candidateCountLabel}</p>
                        <span class="entity-card-link">View candidates</span>
                      </button>
                    </template>
                  </div>
                </template>
                <template lwc:else>
                  <p class="empty-state">
                    No open job groups are available yet.
                  </p>
                </template>
              </section>
            </template>

            <template lwc:if={isCandidatesView}>
              <section class="view-stack">
                <div class="view-toolbar">
                  <lightning-input
                    type="search"
                    label="Search candidates"
                    value={candidateSearchTerm}
                    onchange={handleCandidateSearchChange}
                  ></lightning-input>
                  <button
                    class="primary-pill"
                    type="button"
                    onclick={handleNewCandidate}
                  >
                    Add Candidate
                  </button>
                </div>

                <template lwc:if={candidatesError}>
                  <p class="empty-state">Unable to load candidates.</p>
                </template>
                <template lwc:elseif={hasFilteredCandidates}>
                  <div class="card-grid">
                    <template
                      for:each={filteredCandidates}
                      for:item="candidate"
                    >
                      <button
                        class={candidate.listCardClass}
                        key={candidate.key}
                        type="button"
                        data-id={candidate.recordId}
                        onclick={handleCandidateClick}
                      >
                        <div class="entity-card-header">
                          <span class={candidate.statusClass}>
                            {candidate.status}
                          </span>
                          <span class="candidate-view-hint">View</span>
                        </div>
                        <h2>{candidate.name}</h2>
                        <p>{candidate.company}</p>
                        <small>{candidate.email}</small>
                        <small>Created {candidate.dateLabel}</small>
                      </button>
                    </template>
                  </div>
                </template>
                <template lwc:else>
                  <p class="empty-state">No candidates match this search.</p>
                </template>
              </section>
            </template>

            <template lwc:if={isInterviewsView}>
              <section class="slds-card panel table-panel">
                <div class="panel-header">
                  <h2>All Upcoming Interviews</h2>
                  <button
                    class="primary-pill compact-pill"
                    type="button"
                    data-object="Event"
                    onclick={handleQuickAction}
                  >
                    Schedule Interview
                  </button>
                </div>

                <template lwc:if={allInterviewsError}>
                  <p class="empty-state">Unable to load interviews.</p>
                </template>
                <template lwc:elseif={hasAllInterviews}>
                  <div class="table-scroll">
                    <table>
                      <thead>
                        <tr>
                          <th>Candidate</th>
                          <th>Position</th>
                          <th>Date &amp; Time</th>
                          <th>Interviewer</th>
                          <th>Status</th>
                        </tr>
                      </thead>
                      <tbody>
                        <template for:each={allInterviews} for:item="interview">
                          <tr
                            key={interview.key}
                            class="clickable-row"
                            data-id={interview.recordId}
                            onclick={handleInterviewClick}
                          >
                            <td class="candidate-name">
                              {interview.candidate}
                            </td>
                            <td>{interview.position}</td>
                            <td>{interview.date}</td>
                            <td>{interview.interviewer}</td>
                            <td>
                              <span class={interview.statusClass}>
                                {interview.status}
                              </span>
                            </td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>
                </template>
                <template lwc:else>
                  <p class="empty-state">No upcoming interviews scheduled.</p>
                </template>
              </section>
            </template>

            <template lwc:if={isHiringPipelineView}>
              <section class="slds-card panel">
                <div class="panel-header">
                  <h2>Hiring Pipeline Board</h2>
                  <button
                    class="primary-pill compact-pill"
                    type="button"
                    onclick={handleNewCandidate}
                  >
                    Add Candidate
                  </button>
                </div>

                <template lwc:if={pipelineError}>
                  <p class="empty-state">Unable to load pipeline data.</p>
                </template>
                <template lwc:elseif={hasPipeline}>
                  <div class="kanban-scroll">
                    <div class={fullKanbanClass}>
                      <template for:each={pipelineStages} for:item="stage">
                        <section class={stage.stageClass} key={stage.key}>
                          <div class="kanban-title">
                            <span>{stage.label}</span>
                          </div>
                          <template lwc:if={stage.hasCandidates}>
                            <div class="kanban-column-cards">
                              <template
                                for:each={stage.candidates}
                                for:item="candidate"
                              >
                                <button
                                  class={candidate.cardClass}
                                  key={candidate.key}
                                  type="button"
                                  data-id={candidate.recordId}
                                  onclick={handleCandidateClick}
                                >
                                  <div class="candidate-top">
                                    <strong>{candidate.name}</strong>
                                    <span class="candidate-view-hint"
                                      >View</span
                                    >
                                    <template lwc:if={candidate.showStatus}>
                                      <span class={candidate.badgeClass}>
                                        {candidate.status}
                                      </span>
                                    </template>
                                  </div>
                                  <p>{candidate.role}</p>
                                </button>
                              </template>
                            </div>
                          </template>
                          <template lwc:else>
                            <p class="empty-state compact-empty">
                              No candidates in this stage.
                            </p>
                          </template>
                        </section>
                      </template>
                    </div>
                  </div>
                </template>
                <template lwc:else>
                  <p class="empty-state">
                    No active candidates yet. Add a lead to start building your
                    pipeline.
                  </p>
                </template>
              </section>
            </template>

            <template lwc:if={isOnboardingView}>
              <section class="slds-card onboarding-panel onboarding-page">
                <div class="panel-header clean-header">
                  <h2>Onboarding Progress</h2>
                </div>
                <div class="progress-summary large-progress-summary">
                  <span>Global Tasks</span>
                  <strong>{progressLabel}</strong>
                </div>
                <div class="progress-bar large-progress-bar">
                  <div class="progress-fill" style={progressFillStyle}></div>
                </div>

                <template lwc:if={onboardingError}>
                  <p class="empty-state">Unable to load onboarding tasks.</p>
                </template>
                <template lwc:else>
                  <ul class="checklist onboarding-checklist">
                    <template for:each={onboardingTasks} for:item="task">
                      <li class={task.className} key={task.key}>
                        <lightning-icon
                          class="dashboard-icon"
                          icon-name={task.iconName}
                          size="x-small"
                          alternative-text={task.label}
                        ></lightning-icon>
                        <span>{task.label}</span>
                      </li>
                    </template>
                  </ul>
                </template>
              </section>
            </template>

            <template lwc:if={isReportsView}>
              <section class="view-stack">
                <section
                  class="kpi-grid"
                  aria-label="Recruiting report metrics"
                >
                  <template for:each={kpis} for:item="kpi">
                    <article class="slds-card kpi-card" key={kpi.key}>
                      <div class="metric-icon">
                        <lightning-icon
                          class="dashboard-icon"
                          icon-name={kpi.iconName}
                          size="small"
                          alternative-text={kpi.label}
                        ></lightning-icon>
                      </div>
                      <div class="metric-body">
                        <p>{kpi.label}</p>
                        <div class="metric-value-row">
                          <strong>{kpi.value}</strong>
                        </div>
                      </div>
                    </article>
                  </template>
                </section>
                <div class="card-grid">
                  <article class="entity-card report-card">
                    <h2>Recruitment Reports</h2>
                    <p>
                      Open Salesforce reports for deeper recruiting analysis.
                    </p>
                    <button
                      class="primary-pill"
                      type="button"
                      onclick={handleOpenReportsHome}
                    >
                      Open Reports
                    </button>
                  </article>
                  <article class="entity-card report-card">
                    <h2>Dashboards</h2>
                    <p>
                      Jump to Salesforce dashboard views when you need charts.
                    </p>
                    <button
                      class="secondary-pill"
                      type="button"
                      onclick={handleOpenDashboardsHome}
                    >
                      Open Dashboards
                    </button>
                  </article>
                </div>
              </section>
            </template>

            <template lwc:if={isSettingsView}>
              <section class="view-stack">
                <article class="entity-card settings-card">
                  <div class="entity-card-header">
                    <lightning-icon
                      class="dashboard-icon"
                      icon-name="utility:settings"
                      size="small"
                      alternative-text="Settings"
                    ></lightning-icon>
                    <span class="status-badge pending">Workspace</span>
                  </div>
                  <h2>Recruitment Workspace Settings</h2>
                  <p>
                    This first version keeps settings in-app as a clear landing
                    page. Future updates can wire these controls to org metadata
                    or custom settings.
                  </p>
                </article>
                <div class="settings-grid">
                  <article class="entity-card">
                    <h2>Pipeline Display</h2>
                    <p>
                      Vertical stage layout with per-stage scrolling is enabled.
                    </p>
                  </article>
                  <article class="entity-card">
                    <h2>Navigation</h2>
                    <p>
                      Sidebar buttons now keep users in the recruitment
                      workspace.
                    </p>
                  </article>
                  <article class="entity-card">
                    <h2>Reports</h2>
                    <p>
                      Report and dashboard shortcuts still open native
                      Salesforce pages.
                    </p>
                  </article>
                </div>
              </section>
            </template>
          </template>
        </div>
      </main>

      <footer class="footer">
        <span>© 2024 Patriot Solutions. Version 4.2.1-stable</span>
        <nav aria-label="Footer">
          <button
            class="footer-link"
            type="button"
            data-view="candidates"
            onclick={handleNavClick}
          >
            Candidates
          </button>
          <button
            class="footer-link"
            type="button"
            data-view="reports"
            onclick={handleNavClick}
          >
            Reports
          </button>
          <button
            class="footer-link"
            type="button"
            data-view="dashboard"
            onclick={handleNavClick}
          >
            Dashboard
          </button>
        </nav>
      </footer>
    </div>
  </div>
</template>
